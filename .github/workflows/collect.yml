name: Collect Lostark Prices

on:
  schedule:
    - cron: '0 0 * * *'   # KST 09:00
    - cron: '0 6 * * *'   # KST 15:00
    - cron: '0 13 * * *'  # KST 22:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run material collector
        env:
          LOSTARK_API_KEY: ${{ secrets.LOSTARK_API_KEY }}
        run: python collect_materials.py

      - name: Run gem collector
        env:
          LOSTARK_API_KEY: ${{ secrets.LOSTARK_API_KEY }}
        run: python collect_gems.py

      - name: Commit updated DB
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase origin main
          git add lostark_prices.db
          git diff --staged --quiet || git commit -m "data: $(date '+%Y-%m-%d %H:%M') KST"
          git push